<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4_colores</title>
    
</head>
<body style="display: flex; justify-content: space-around; ">
    <main  style="display:flex; 
   flex-direction: column; gap: 3px;">

        <div id="div1" style="background-color: blue; width: 200px; height: 200px;" >
        </div>
        
        <div id="div2" style="background-color: red;  width: 200px; height: 200px;" >
        </div>
        
        <div id="div3" style="background-color: green; width: 200px; height: 200px;" >
        </div>
        
        <div id="div4" style="background-color: yellow; width: 200px; height: 200px;" >
        </div>
    </main>
    <section id="extraDiv">    
    </section>

    <script>     
    // div colors 
        const div1  = document.getElementById("div1");
        const div2  = document.getElementById("div2");
        const div3  = document.getElementById("div3");
        const div4  = document.getElementById("div4");
     
       clickPaint = (element) => element.style.backgroundColor = 'black';  
        div1.addEventListener('click', ()=>clickPaint(div1));
        div2.addEventListener('click', ()=>clickPaint(div2));
        div3.addEventListener('click', ()=>clickPaint(div3));
        div4.addEventListener('click', ()=>clickPaint(div4));

    // extra div 
        
        function addDIV(color){            
            box = document.getElementById("extraDiv");
            newEle =  document.createElement("div");
                newEle.id = "key"
                newEle.style.backgroundColor = color
                newEle.style.width = "200px";
                newEle.style.height = "200px";
            box.appendChild(newEle);
            }

        function keyPaint(color) {
            let divSel = document.getElementById('key');
                divSel.style.backgroundColor = color;               
            }

        document.addEventListener('keydown', function(event) {
            let divSel = document.getElementById('key');
            if (event.key === 'a' && divSel == null) {addDIV('pink')} else if (event.key === 'a'){ keyPaint('pink')}
            if (event.key === 's' && divSel == null) {addDIV('orange')} else if (event.key === 's'){ keyPaint('orange')}
            if (event.key === 'd' && divSel == null) {addDIV('cyan')} else if (event.key === 'd'){ keyPaint('cyan')}          
            })        
    </script>
</body>
</html>
